<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8ED;
    --charcoal:#2B2118;
    --tomato:#E8542A;
    --butter:#FFD23F;
    --basil:#3C6E47;
    --grape:#7B4B94;
    --line: rgba(43,33,24,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--charcoal);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px;}

  /* HERO */
  header{
    padding:64px 0 40px;
    border-bottom:3px dashed var(--line);
    position:relative;
    overflow:hidden;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--tomato);
    font-weight:600;
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-style:italic;
    font-size:clamp(42px, 8vw, 76px);
    line-height:0.95;
    margin:0 0 18px;
    letter-spacing:-0.01em;
  }
  h1 span{color:var(--tomato); font-style:normal;}
  .sub{
    font-size:18px;
    max-width:520px;
    line-height:1.5;
    color:rgba(43,33,24,0.75);
    margin:0;
  }

  /* SEARCH */
  .search-row{
    margin-top:32px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  #search{
    flex:1;
    min-width:220px;
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    padding:14px 18px;
    border:2px solid var(--charcoal);
    border-radius:999px;
    background:#fff;
    outline:none;
    transition:box-shadow .15s ease, transform .15s ease;
  }
  #search:focus{
    box-shadow:0 0 0 4px rgba(232,84,42,0.18);
  }
  .tag-filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .tag-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:9px 14px;
    border-radius:999px;
    border:2px solid var(--charcoal);
    background:transparent;
    cursor:pointer;
    font-weight:600;
    transition:all .12s ease;
  }
  .tag-btn.active{
    background:var(--charcoal);
    color:var(--cream);
  }

  /* COUNT */
  .count-line{
    margin-top:18px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:rgba(43,33,24,0.55);
  }

  /* GRID */
  #grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:28px;
    padding:44px 0 80px;
  }

  .card{
    background:#fff;
    border:2px solid var(--charcoal);
    border-radius:4px 16px 16px 16px;
    padding:26px 22px 22px;
    position:relative;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:4px 4px 0 var(--line);
  }
  .card:hover{
    transform:translate(-2px,-4px) rotate(-0.4deg);
    box-shadow:7px 8px 0 var(--line);
  }
  .tab{
    position:absolute;
    top:-14px;
    left:22px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:5px 12px;
    border-radius:6px;
    color:#fff;
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .card h3{
    font-family:'Fraunces', serif;
    font-size:26px;
    font-weight:600;
    margin:14px 0 8px;
    line-height:1.1;
  }
  .card .meta{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:rgba(43,33,24,0.55);
    margin-bottom:10px;
  }
  .card .story{
    font-size:14px;
    line-height:1.5;
    color:rgba(43,33,24,0.8);
    margin:0;
  }
  .card .chips{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    padding:3px 9px;
    border-radius:999px;
    border:1.5px solid var(--charcoal);
    color:var(--charcoal);
  }

  /* CATEGORY COLORS */
  .cat-dessert{background:var(--grape);}
  .cat-mains{background:var(--tomato);}
  .cat-baking{background:var(--butter); color:var(--charcoal); box-shadow:2px 2px 0 rgba(0,0,0,0.15);}
  .cat-sides{background:var(--basil);}
  .cat-drinks{background:#2E7D8C;}

  /* MODAL */
  .overlay{
    position:fixed; inset:0;
    background:rgba(43,33,24,0.55);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:40px 20px;
    overflow-y:auto;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--cream);
    border:3px solid var(--charcoal);
    border-radius:6px 22px 22px 22px;
    max-width:640px;
    width:100%;
    padding:40px;
    position:relative;
    box-shadow:8px 10px 0 rgba(43,33,24,0.25);
  }
  .close-btn{
    position:absolute;
    top:18px; right:18px;
    width:36px;height:36px;
    border-radius:50%;
    border:2px solid var(--charcoal);
    background:#fff;
    font-size:18px;
    cursor:pointer;
    line-height:1;
  }
  .modal .tab{position:static; display:inline-block; margin-bottom:14px;}
  .modal h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:38px;
    margin:0 0 6px;
    line-height:1.05;
  }
  .modal .meta{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:rgba(43,33,24,0.6);
    margin-bottom:18px;
  }
  .modal .story{
    font-size:15px;
    line-height:1.6;
    margin-bottom:26px;
    padding:14px 16px;
    background:rgba(255,210,63,0.25);
    border-left:3px solid var(--butter);
    border-radius:0 8px 8px 0;
  }
  .modal h4{
    font-family:'JetBrains Mono', monospace;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:0.08em;
    margin:26px 0 12px;
    color:var(--tomato);
  }
  .modal ul{margin:0; padding-left:0; list-style:none;}
  .modal ul li{
    font-size:15px;
    padding:7px 0;
    border-bottom:1px dashed var(--line);
    display:flex;
    justify-content:space-between;
    gap:12px;
  }
  .modal ul li .amt{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    color:var(--basil);
    white-space:nowrap;
  }
  .modal ol{margin:0; padding-left:22px;}
  .modal ol li{
    font-size:15px;
    line-height:1.6;
    padding:8px 0;
  }
  .modal ol li::marker{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    color:var(--tomato);
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    font-family:'JetBrains Mono', monospace;
    color:rgba(43,33,24,0.5);
  }

  footer{
    border-top:3px dashed var(--line);
    padding:32px 0 60px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:rgba(43,33,24,0.55);
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .card, #search{transition:none;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">est. this year &mdash; still cooking</div>
    <h1>The Recipe<br><span>Box.</span></h1>
    <p class="sub">A living collection of the recipes worth keeping &mdash; where they came from, who made them first, and the notes that make them mine.</p>

    <div class="search-row">
      <input id="search" type="text" placeholder="Search recipes, ingredients, tags...">
    </div>
    <div class="tag-filters" id="tagFilters"></div>
    <div class="count-line" id="countLine"></div>
  </header>

  <div id="grid"></div>

  <footer>
    Got a recipe to add? Send it through and it'll land in the box.
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const CAT_COLORS = {
  "dessert": "cat-dessert",
  "mains": "cat-mains",
  "baking": "cat-baking",
  "sides": "cat-sides",
  "drinks": "cat-drinks"
};

// ---- RECIPE DATA ----
// To add a recipe, copy the {} block below and fill it in.
const recipes = [
  {
    name: "Pizzechuriso",
    category: "dessert",
    story: "A baked rice custard with lemon, vanilla and a good hit of Galliano — the kind of dessert that shows up at every family gathering and never has a written-down version anywhere except this one.",
    tags: ["dessert", "baking", "family recipe", "Italian"],
    time: "~1hr 15min",
    serves: "12–14 (2 baking trays)",
    ingredients: [
      { amt: "1.5 cups", item: "rice" },
      { amt: "500g", item: "ricotta (1 big tub)" },
      { amt: "7", item: "eggs" },
      { amt: "2 cups", item: "sugar" },
      { amt: "3 tsp", item: "vanilla essence" },
      { amt: "1", item: "large lemon, rind only" },
      { amt: "1/2 cup", item: "vanilla Galliano" },
      { amt: "750ml", item: "milk" },
      { amt: "1.5 tbsp", item: "butter" },
      { amt: "300ml", item: "cream" },
      { amt: "1 sprinkle", item: "cinnamon" }
    ],
    method: [
      "Boil the rice for 6 minutes.",
      "Strain, then simmer in the milk until the milk is fully absorbed.",
      "Take off the heat and add the sugar, lemon rind, vanilla essence and butter. Stir through.",
      "Beat the eggs.",
      "In a separate bowl, mash the ricotta, then add the eggs, cream and Galliano.",
      "Combine everything with the rice — the mixture should be runny.",
      "Pour evenly into greased baking trays and sprinkle with cinnamon.",
      "Bake for 1 hour in a moderate fan-forced oven."
    ]
  },
  {
    name: "Pasta e Broccoli",
    category: "mains",
    story: "One of three pastas built on the same bones — garlic, onion and parsley sautéed low and slow, then simmered with whatever's the star of the day. Here it's broccoli, softened right down until it's almost a sauce.",
    tags: ["pasta", "weeknight", "Italian", "vegetarian"],
    time: "30 min",
    serves: "4",
    ingredients: [
      { amt: "400g", item: "short pasta (orecchiette or similar)" },
      { amt: "2–3 cloves", item: "garlic, sliced" },
      { amt: "3 tbsp", item: "olive oil" },
      { amt: "1 small", item: "onion, chopped (brown, white, leek or spring onion)" },
      { amt: "to taste", item: "parsley stalks, chopped (leaves reserved for dressing)" },
      { amt: "1 head", item: "broccoli, cut into small florets" },
      { amt: "1", item: "lemon, zested (juice optional, to finish)" },
      { amt: "1/2 cup", item: "white wine" },
      { amt: "1 cup", item: "pasta water, reserved" },
      { amt: "to taste", item: "parmigiano, grated" }
    ],
    method: [
      "Put a large pot of salted water on to boil for the pasta.",
      "Sauté the garlic, onion and chopped parsley stalks in olive oil over low-medium heat until softened.",
      "Add the broccoli florets and lemon zest, then pour in the white wine.",
      "Simmer slowly until the broccoli is tender and starting to break down.",
      "Meanwhile, cook the pasta in the separate pot until just shy of al dente.",
      "Drain the pasta, reserving 1/2 to 1 cup of the pasta water.",
      "Mix the pasta into the pan with the broccoli, then add a splash of the reserved pasta water to loosen everything into a sauce.",
      "Dress with the reserved parsley, parmigiano, and a squeeze of lemon juice if you like."
    ]
  },
  {
    name: "Pasta Aglio e Olio",
    category: "mains",
    story: "The simplest of the three, and the one where garlic itself becomes the star — the 'main item' here is just more garlic.",
    tags: ["pasta", "weeknight", "Italian", "vegetarian"],
    time: "20 min",
    serves: "4",
    ingredients: [
      { amt: "400g", item: "spaghetti" },
      { amt: "2–3 cloves", item: "garlic, sliced (for the base)" },
      { amt: "6 cloves", item: "garlic, chopped (the 'main item')" },
      { amt: "4 tbsp", item: "olive oil" },
      { amt: "1 small", item: "onion, chopped (brown, white, leek or spring onion)" },
      { amt: "to taste", item: "parsley stalks, chopped (leaves reserved for dressing)" },
      { amt: "1", item: "lemon, zested (juice optional, to finish)" },
      { amt: "1/2 cup", item: "white wine" },
      { amt: "1 cup", item: "pasta water, reserved" },
      { amt: "to taste", item: "parmigiano, grated" }
    ],
    method: [
      "Put a large pot of salted water on to boil for the pasta.",
      "Sauté the sliced garlic, onion and chopped parsley stalks in olive oil over low-medium heat.",
      "Add the extra 6 chopped garlic cloves along with the lemon zest, then pour in the white wine.",
      "Simmer slowly until the garlic is soft and mellow, not browned.",
      "Meanwhile, cook the spaghetti in the separate pot until just shy of al dente.",
      "Drain the pasta, reserving 1/2 to 1 cup of the pasta water.",
      "Mix the pasta into the pan with the garlic, then add a splash of the reserved pasta water to bring it together.",
      "Dress with the reserved parsley, parmigiano, and a squeeze of lemon juice if you like."
    ]
  },
  {
    name: "Pasta e Fagioli",
    category: "mains",
    story: "The heartiest of the three — a tin of beans standing in as the main item, simmered until they start to break down into the sauce itself.",
    tags: ["pasta", "weeknight", "Italian", "vegetarian"],
    time: "30 min",
    serves: "4",
    ingredients: [
      { amt: "400g", item: "short pasta (ditalini or similar)" },
      { amt: "2–3 cloves", item: "garlic, sliced" },
      { amt: "3 tbsp", item: "olive oil" },
      { amt: "1 small", item: "onion, chopped (brown, white, leek or spring onion)" },
      { amt: "to taste", item: "parsley stalks, chopped (leaves reserved for dressing)" },
      { amt: "1 tin", item: "beans (cannellini or borlotti), drained" },
      { amt: "1", item: "lemon, zested (juice optional, to finish)" },
      { amt: "1/2 cup", item: "white wine" },
      { amt: "1 cup", item: "pasta water, reserved" },
      { amt: "to taste", item: "parmigiano, grated" }
    ],
    method: [
      "Put a large pot of salted water on to boil for the pasta.",
      "Sauté the garlic, onion and chopped parsley stalks in olive oil over low-medium heat until softened.",
      "Add the tin of beans and the lemon zest, then pour in the white wine.",
      "Simmer slowly until the beans are heated through and starting to soften into the sauce.",
      "Meanwhile, cook the pasta in the separate pot until just shy of al dente.",
      "Drain the pasta, reserving 1/2 to 1 cup of the pasta water.",
      "Mix the pasta into the pan with the beans, then add a splash of the reserved pasta water to bring it together.",
      "Dress with the reserved parsley, parmigiano, and a squeeze of lemon juice if you like."
    ]
  }
];

// ---- RENDER ----
const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const tagFiltersEl = document.getElementById('tagFilters');
const countLine = document.getElementById('countLine');
let activeTag = null;

function allTags(){
  const s = new Set();
  recipes.forEach(r => r.tags.forEach(t => s.add(t)));
  return [...s].sort();
}

function renderTagFilters(){
  tagFiltersEl.innerHTML = '';
  allTags().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => {
      activeTag = (activeTag === tag) ? null : tag;
      renderTagFilters();
      renderGrid();
    };
    tagFiltersEl.appendChild(btn);
  });
}

function matches(r, q){
  const hay = [
    r.name, r.category, r.story,
    ...r.tags,
    ...r.ingredients.map(i => i.item)
  ].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase());
}

function renderGrid(){
  const q = searchInput.value.trim();
  const filtered = recipes.filter(r => {
    const qMatch = q === '' || matches(r, q);
    const tMatch = !activeTag || r.tags.includes(activeTag);
    return qMatch && tMatch;
  });

  countLine.textContent = filtered.length === recipes.length
    ? `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''} in the box`
    : `${filtered.length} of ${recipes.length} recipes`;

  grid.innerHTML = '';
  if (filtered.length === 0){
    grid.innerHTML = '<div class="empty-state">Nothing matches yet — try a different search.</div>';
    return;
  }

  filtered.forEach((r, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(r);
    card.innerHTML = `
      <div class="tab ${CAT_COLORS[r.category] || 'cat-mains'}">${r.category}</div>
      <h3>${r.name}</h3>
      <div class="meta">${r.time} &middot; serves ${r.serves}</div>
      <p class="story">${r.story}</p>
      <div class="chips">${r.tags.map(t => `<span class="chip">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });
}

function openModal(r){
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="tab ${CAT_COLORS[r.category] || 'cat-mains'}">${r.category}</div>
    <h2>${r.name}</h2>
    <div class="meta">${r.time} &middot; serves ${r.serves}</div>
    <div class="story">${r.story}</div>
    <h4>Ingredients</h4>
    <ul>${r.ingredients.map(i => `<li><span>${i.item}</span><span class="amt">${i.amt}</span></li>`).join('')}</ul>
    <h4>Method</h4>
    <ol>${r.method.map(step => `<li>${step}</li>`).join('')}</ol>
  `;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

searchInput.addEventListener('input', renderGrid);

renderTagFilters();
renderGrid();
</script>

</body>
</html>
